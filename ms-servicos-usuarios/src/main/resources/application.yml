server:
  port: 8095
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useTimezone=true&serverTimezone=America/saopaulo
    username: myuser
    password: secret

  jpa:
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      dll-auto: update
      format_sql: true
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

openapi:
  service:
    title: test-service doc
    version: 1.0.0
    url: http://localhost:8888 #api gateway url
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
springdoc:
  api-docs:
    path: user-service/v3/api-docs
  swagger-ui:
    path: user-service/swagger-ui.html